<!DOCTYPE html>
<html>
<head>
    <title>Add Job</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand text-white">Placement Management System</a>
        <div>
            {% if user %}
                <span class="text-white me-3">Hello, {{ user.name }}</span>
                <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="card shadow p-4 col-md-8 mx-auto">
        <h2 class="text-center mb-4">Add New Job</h2>

        {% if message %}
            <div class="alert alert-info">{{ message }}</div>
        {% endif %}

        <form action="/add-job" method="post">
            <div class="mb-3">
                <label class="form-label">Job Title</label>
                <input type="text" name="title" class="form-control" placeholder="Enter Job Title" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Company Name</label>
                <input type="text" name="company" class="form-control" placeholder="Enter Company Name" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Job Description</label>
                <textarea name="description" class="form-control" rows="5" placeholder="Enter Job Description" required></textarea>
            </div>

            <button type="submit" class="btn btn-primary">Add Job</button>
            <a href="/jobs" class="btn btn-secondary ms-2">View Jobs</a>
        </form>
    </div>
</div>

</body>
</html>
